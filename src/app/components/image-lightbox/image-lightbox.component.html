<div class="lightbox-container">
  <button mat-icon-button class="close-btn" (click)="close()">
    <mat-icon>close</mat-icon>
  </button>

  <button
    mat-icon-button
    class="nav-btn nav-prev"
    (click)="navigate('prev')"
    [disabled]="data.index === 0"
  >
    <mat-icon>chevron_left</mat-icon>
  </button>

  <div
    class="image-wrapper"
    [class.zoomed]="isZoomed()"
    (click)="onImageClick($event)"
    (mousemove)="onMouseMove($event)"
    (wheel)="onWheel($event)"
  >
    <img
      [src]="data.url"
      alt="Imagen ampliada"
      [style.transform]="'scale(' + zoomLevel() + ')'"
      [style.transform-origin]="transformOrigin()"
    />
  </div>

  <button
    mat-icon-button
    class="nav-btn nav-next"
    (click)="navigate('next')"
    [disabled]="data.index === data.total - 1"
  >
    <mat-icon>chevron_right</mat-icon>
  </button>

  <div class="lightbox-footer">
    <div class="image-counter">{{ data.index + 1 }} / {{ data.total }}</div>
    <div class="zoom-controls">
      @if (isZoomed()) {
        <button mat-icon-button (click)="resetZoom()" matTooltip="Restablecer zoom">
          <mat-icon>zoom_out</mat-icon>
        </button>
      }
      <span class="zoom-hint">
        <mat-icon class="hint-icon">{{ isZoomed() ? 'zoom_out' : 'zoom_in' }}</mat-icon>
        {{ isZoomed() ? 'Clic para alejar' : 'Clic o scroll para zoom' }}
      </span>
    </div>
  </div>
</div>
